name: Release theory.pdf

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to use for release asset and Zenodo upload
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-theory-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
            release_url="$RELEASE_URL"
          else
            tag="$INPUT_TAG"
            release_url="$(gh release view "$tag" --json url -q .url || true)"
          fi
          if [ -z "$tag" ]; then
            echo "Tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.meta.outputs.tag }}

      - name: Ensure theory PDF exists
        run: |
          test -f tex/theory.pdf
          test -s tex/theory.pdf

      - name: Upload theory PDF to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" tex/theory.pdf#theory.pdf --clobber

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Zenodo uploader dependency
        run: python -m pip install --upgrade pip requests

      - name: Upload theory PDF to Zenodo
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_CONCEPT_RECORD_ID: ${{ vars.ZENODO_CONCEPT_RECORD_ID }}
          ZENODO_SEED_RECORD_ID_OR_DOI: ${{ vars.ZENODO_SEED_RECORD_ID_OR_DOI }}
          ZENODO_API_URL: ${{ vars.ZENODO_API_URL }}
        run: |
          if [ -z "${ZENODO_ACCESS_TOKEN:-}" ] || { [ -z "${ZENODO_CONCEPT_RECORD_ID:-}" ] && [ -z "${ZENODO_SEED_RECORD_ID_OR_DOI:-}" ]; }; then
            echo "Zenodo upload skipped because ZENODO_ACCESS_TOKEN and either ZENODO_CONCEPT_RECORD_ID or ZENODO_SEED_RECORD_ID_OR_DOI are not configured."
            exit 0
          fi
          python scripts/release_to_zenodo.py \
            --pdf tex/theory.pdf \
            --tag "${{ steps.meta.outputs.tag }}" \
            --release-url "${{ steps.meta.outputs.release_url }}"
